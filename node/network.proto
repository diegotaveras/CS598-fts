syntax = "proto3";

package network;

service NetworkService {
  rpc Ping(PingRequest) returns (PingReply);
  rpc HandleProtocolMessage(ProtocolMessage) returns (MessageReply);
}

message PingRequest {
  string sender = 1;
}

message PingReply {
  string node_id = 1;
  string status = 2;
}

message MessageRequest {
  string sender = 1;
  string msg = 2;
}

message MessageReply {
  string status = 1;
}

message ProtocolMessage {
  string sender = 1;

  oneof payload {
    ClientRequest client_request = 2;
    OrderedRequest ordered_request = 3;
    SpeculativeReply speculative_reply = 4;
  }
}

message ClientRequest {
  string request_id = 1;
  string client_id = 2;
  string prompt = 3;
  uint64 timestamp = 4;
}

message OrderedRequest {
  string request_id = 1;
  string client_id = 2;
  int32 view = 3;
  int32 seqno = 4;
  string prompt = 5;
  string leader_id = 6;
}

message SpeculativeReply {
  string request_id = 1;
  string client_id = 2;
  int32 view = 3;
  int32 seqno = 4;
  int32 round_no = 5;
  bool approved_leader = 6;
  string result = 7;
}
